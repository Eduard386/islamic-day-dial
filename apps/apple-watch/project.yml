name: IslamicDayDial
options:
  bundleIdPrefix: com.islamicdaydial
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
packages:
  Adhan:
    url: https://github.com/batoulapps/Adhan-Swift
    from: "1.4.0"
targets:
  IslamicDayDial:
    type: application
    platform: iOS
    sources:
      - path: IslamicDayDial
      - path: IslamicDayDialWatch
        excludes:
          - IslamicDayDialWatchApp.swift
          - ContentView.swift
    dependencies:
      - target: IslamicDayDialWatch
      - target: IslamicDayDialWidget
        embed: true
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  IslamicDayDialWatch:
    type: application
    platform: watchOS
    sources: [IslamicDayDialWatch]
    dependencies:
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios.watch
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.islamicdaydial.ios
  IslamicDayDialWidget:
    type: app-extension
    subtype: widgetkit-extension
    platform: iOS
    sources:
      - path: IslamicDayDialWidget
      - path: IslamicDayDialWatch
        excludes:
          - IslamicDayDialWatchApp.swift
          - ContentView.swift
    dependencies:
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios.widget
        INFOPLIST_FILE: IslamicDayDialWidget/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
