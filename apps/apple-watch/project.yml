name: IslamicDayDial
options:
  bundleIdPrefix: com.islamicdaydial
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
packages:
  Adhan:
    url: https://github.com/batoulapps/Adhan-Swift
    from: "1.4.0"
schemes:
  IslamicDayDial:
    build:
      targets:
        IslamicDayDial: all
    test:
      config: Debug
      targets:
        - IslamicDayDialTests
    run:
      config: Debug
    archive:
      config: Release
  IslamicDayDialWatch:
    build:
      targets:
        IslamicDayDialWatch: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  IslamicDayDial:
    type: application
    platform: iOS
    # Defines SUPABASE_* for INFOPLIST_KEY_* substitution (see IslamicDayDial/Config.xcconfig.example).
    configFiles:
      Debug: IslamicDayDial/Config.xcconfig
      Release: IslamicDayDial/Config.xcconfig
    sources:
      - path: IslamicDayDial
      - path: IslamicDayShared
    dependencies:
      - target: IslamicDayDialWatch
      - target: IslamicDayDialWidget
        embed: true
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        # Swift iOS widget + embedded watch bundle: helps Xcode embed stdlib / avoid flaky companion install.
        EMBEDDED_CONTENT_CONTAINS_SWIFT: YES
        # Match watch app; debug dylib in host can confuse some device install paths.
        ENABLE_DEBUG_DYLIB: NO
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Islamic Day Dial uses your location to calculate accurate prayer times.
        INFOPLIST_KEY_SupabaseURL: "$(SUPABASE_URL)"
        INFOPLIST_KEY_SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  IslamicDayDialWatch:
    type: application
    platform: watchOS
    configFiles:
      Debug: IslamicDayDial/Config.xcconfig
      Release: IslamicDayDial/Config.xcconfig
    sources:
      - path: IslamicDayDialWatch
      - path: IslamicDayShared
        excludes:
          - IslamicDayCore/DayBounds.swift
          - IslamicDayCore/WidgetPresentation.swift
          - IslamicDayCore/Snapshot.swift
          - IslamicDayCore/HijriCalendar.swift
          - IslamicDayCore/GeoResolver.swift
          - IslamicDayCore/PrayerTimes.swift
          - IslamicDayCore/NightMarkers.swift
      - path: IslamicDayDialWatchAssets
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios.watch
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        SKIP_INSTALL: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.islamicdaydial.ios
  IslamicDayDialWidget:
    type: app-extension
    subtype: widgetkit-extension
    platform: iOS
    sources:
      - path: IslamicDayDialWidget
      - path: IslamicDayShared
    dependencies:
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios.widget
        INFOPLIST_FILE: IslamicDayDialWidget/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  IslamicDayDialTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IslamicDayDialTests
      - path: IslamicDayShared
      - path: IslamicDayDial
        includes:
          - PrayerNotificationScheduler.swift
          - PhoneHomePresentation.swift
    dependencies:
      - target: IslamicDayDial
      - package: Adhan
    settings:
      base:
        DEVELOPMENT_TEAM: FB736M6KFV
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios.IslamicDayDialTests
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
