name: IslamicDayDial
options:
  bundleIdPrefix: com.islamicdaydial
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
packages:
  Adhan:
    url: https://github.com/batoulapps/Adhan-Swift
    from: "1.4.0"
targets:
  IslamicDayDial:
    type: application
    platform: iOS
    sources: [IslamicDayDial]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.ios
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  IslamicDayDialWatch:
    type: application
    platform: watchOS
    sources: [IslamicDayDialWatch]
    packageProductDependencies:
      - package: Adhan
        product: Adhan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.islamicdaydial.watch
        INFOPLIST_KEY_CFBundleDisplayName: Islamic Day Dial
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.islamicdaydial.ios
