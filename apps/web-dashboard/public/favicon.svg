<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0" stop-color="#ffeb3b"/>
      <stop offset="0.5" stop-color="#ffd54f"/>
      <stop offset="1" stop-color="#ff8f00"/>
    </linearGradient>
  </defs>
  <!-- Sun: solid yellow semicircle (dome) -->
  <path fill="url(#sunGrad)" d="M12 32 A20 20 0 0 1 52 32 L52 34 A20 20 0 0 0 12 34 Z"/>
  <!-- 5 small rays, evenly spaced above the curve -->
  <rect x="30" y="4" width="2.5" height="8" rx="1" fill="#ffeb3b" transform="rotate(0 31.25 12)"/>
  <rect x="26" y="8" width="2.5" height="7" rx="1" fill="#ffeb3b" transform="rotate(-45 27.25 14.5)"/>
  <rect x="35" y="8" width="2.5" height="7" rx="1" fill="#ffeb3b" transform="rotate(45 36.75 14.5)"/>
  <rect x="20" y="16" width="2.5" height="6" rx="1" fill="#ffeb3b" transform="rotate(-70 21.25 19)"/>
  <rect x="41" y="16" width="2.5" height="6" rx="1" fill="#ffeb3b" transform="rotate(70 42.75 19)"/>
  <!-- 4 horizontal reflection streaks, varying widths, decreasing -->
  <rect x="14" y="36" width="36" height="2" rx="0.5" fill="url(#sunGrad)" opacity="0.95"/>
  <rect x="18" y="40" width="28" height="2" rx="0.5" fill="url(#sunGrad)" opacity="0.85"/>
  <rect x="22" y="44" width="20" height="1.5" rx="0.5" fill="url(#sunGrad)" opacity="0.75"/>
  <rect x="26" y="47" width="12" height="1.5" rx="0.5" fill="url(#sunGrad)" opacity="0.6"/>
</svg>
